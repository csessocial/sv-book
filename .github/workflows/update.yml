name: SV Book 자동 수집

on:
  schedule:
    - cron: '0 1 * * 1'  # 매주 월요일 오전 10시 (KST = UTC+1 = 01:00 UTC)
  workflow_dispatch:      # 수동 실행 버튼

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests beautifulsoup4 lxml anthropic pdfplumber

      - name: SV Book 수집
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate.py

      - name: index.html 복사
        run: cp SV_Book.html index.html

      - name: GitHub Pages에 배포
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html sv_books_data.json
          git diff --staged --quiet || git commit -m "자동 업데이트: $(date +'%Y.%m.%d')"
          git push
